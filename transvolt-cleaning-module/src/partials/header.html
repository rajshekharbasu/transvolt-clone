<header
  class="sticky top-0 z-[99999] flex w-full border-b border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-900"
>
  <div
    class="relative flex w-full items-center justify-between gap-2 px-3 py-1.5 sm:px-4 lg:px-6 lg:py-2.5"
  >
    <!-- Left: Hamburger BTN & Logo -->
    <div class="flex items-center gap-3">
      <!-- Hamburger Toggle BTN -->
      <button
        class="z-99999 flex h-7 w-7 lg:h-9 lg:w-9 items-center justify-center rounded-lg border border-gray-200 text-gray-500 dark:border-gray-800 dark:text-gray-400 bg-gray-50 hover:bg-gray-100 dark:bg-gray-800/50 dark:hover:bg-gray-800 transition-colors"
        @click.stop="sidebarToggle = !sidebarToggle"
      >
        <i class="ph ph-list text-lg lg:text-xl"></i>
      </button>

      <!-- Logo -->
      <a href="index.html" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 lg:hidden flex items-center">
        <img class="dark:hidden max-h-5" src="https://res.cloudinary.com/dmzhlzyqp/image/upload/v1779711207/Transvolt_Logo_nejpai.png" alt="Logo" />
        <img
          class="hidden dark:block max-h-5"
          src="https://res.cloudinary.com/dmzhlzyqp/image/upload/v1779775358/Transvolt_Logo_1_sqxuhk.png"
          alt="Logo"
        />
      </a>
    </div>

    <!-- Right: Dark Mode Toggle & User Profile -->
    <div class="flex items-center gap-2 lg:gap-3">
      <!-- Dark Mode Toggler -->
      <button
        class="flex h-7 w-7 lg:h-9 lg:w-9 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white"
        @click.prevent="darkMode = !darkMode"
      >
        <i class="ph ph-sun text-md lg:text-lg dark:hidden"></i>
        <i class="ph ph-moon text-md lg:text-lg hidden dark:block"></i>
      </button>

      <!-- User Area -->
      <div
        class="relative"
        x-data="{ dropdownOpen: false }"
        @click.outside="dropdownOpen = false"
      >
        <a
          class="flex items-center text-gray-700 dark:text-gray-400 gap-1.5 lg:gap-2"
          href="#"
          @click.prevent="dropdownOpen = ! dropdownOpen"
        >
          <span class="h-7 w-7 lg:h-9 lg:w-9 overflow-hidden rounded-full border border-gray-200 dark:border-gray-800">
            <img src="./images/user/owner.jpg" alt="User" class="object-cover h-full w-full" />
          </span>

          <span class="text-xs lg:text-sm hidden sm:block font-semibold text-gray-700 dark:text-gray-300"> Musharof </span>

          <i class="ph ph-caret-down text-xs text-gray-500 dark:text-gray-400 transition-transform" :class="dropdownOpen && 'rotate-180'"></i>
        </a>

        <!-- Dropdown Start -->
        <div
          x-show="dropdownOpen"
          class="absolute right-0 mt-2 flex w-48 flex-col rounded-2xl border border-gray-200 bg-white p-3 shadow-lg dark:border-gray-800 dark:bg-gray-900 z-[9999]"
          style="display: none;"
        >
          <div>
            <span
              class="text-xs block font-bold text-gray-700 dark:text-gray-300"
            >
              Musharof Chowdhury
            </span>
            <span
              class="text-[10px] mt-0.5 block text-gray-500 dark:text-gray-400"
            >
              randomuser@pimjo.com
            </span>
          </div>

          <ul
            class="flex flex-col gap-1 border-t border-gray-200 mt-2 pt-2 dark:border-gray-800"
          >
            <li>
              <a
                href="profile.html"
                class="group text-xs flex items-center gap-2 rounded-lg px-2 py-1.5 font-medium text-gray-700 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
              >
                <i class="ph ph-user text-md"></i>
                Edit profile
              </a>
            </li>
            <li>
              <a
                href="#"
                class="group text-xs flex items-center gap-2 rounded-lg px-2 py-1.5 font-medium text-gray-700 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
              >
                <i class="ph ph-sign-out text-md"></i>
                Sign out
              </a>
            </li>
          </ul>
        </div>
        <!-- Dropdown End -->
      </div>
    </div>
  </div>
</header>
