              fill=""
            />

        <ul class="flex flex-col gap-4 mb-6" x-data="{
          initSortable() {
            let loadSortable = () => {
              Sortable.create(this.$el, {
                animation: 150,
                draggable: 'li',
                delay: 150,
                delayOnTouchOnly: true,
                ghostClass: 'opacity-50',
                onEnd: (evt) => {
                  let order = Array.from(this.$el.querySelectorAll('li')).map(li => li.getAttribute('data-id'));
                  localStorage.setItem('sidebarOrder', JSON.stringify(order));
                }
              });
              
              let order = JSON.parse(localStorage.getItem('sidebarOrder'));
              if (order) {
                let items = Array.from(this.$el.querySelectorAll('li'));
                order.forEach(id => {
                  let item = items.find(li => li.getAttribute('data-id') === id);
                  if (item) this.$el.appendChild(item);
                });
              }
            };

            if (typeof Sortable === 'undefined') {
              let script = document.createElement('script');
              script.src = 'https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js';
              script.onload = loadSortable;
              document.head.appendChild(script);
            } else {
              loadSortable();
            }
          }
        }" x-init="initSortable()">
